version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: srs_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://pgadmin:tWLhUy6pzs2KjtKOl2ucf-v2@azure-db-lang-study.postgres.database.azure.com:5432/aicards?sslmode=require
      DATABASE_ECHO: "false"
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      OBSIDIAN_FOLDER_PATH: /app/obsidian-test
      SRS_TAG: ${SRS_TAG:-srs}
      CORS_ORIGINS: '["https://translatepls.me"]'
      COUCHDB_USERNAME: ${COUCHDB_USERNAME:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
      COUCHDB_DB_NAME: obsidian-sync
    ports:
      - "8000:8000"
    volumes:
      - ./obsidian-test:/app/obsidian-test

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: srs_frontend
    restart: unless-stopped
    ports:
      - "3006:3000"
